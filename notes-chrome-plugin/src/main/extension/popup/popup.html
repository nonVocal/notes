<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <style>
        body {
            width: 350px;
            min-height: 400px;
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
        }
        header {
            background: #4285f4;
            color: white;
            padding: 12px 16px;
            font-size: 18px;
            font-weight: bold;
        }
        #new-note { padding: 12px; background: white; border-bottom: 1px solid #ddd; }
        #new-note input, #new-note textarea {
            width: 100%; box-sizing: border-box; margin-bottom: 6px;
            border: 1px solid #ccc; border-radius: 4px; padding: 6px;
        }
        #new-note textarea { height: 70px; resize: none; }
        #new-note button {
            background: #4285f4; color: white; border: none;
            border-radius: 4px; padding: 6px 14px; cursor: pointer;
        }
        #notes-list { padding: 8px; }
        .note-item {
            background: white; border-radius: 6px; padding: 10px;
            margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.12);
        }
        .note-title { font-weight: bold; margin-bottom: 4px; }
        .note-content { font-size: 13px; color: #555; }
        .note-delete { float: right; cursor: pointer; color: #c00; font-size: 12px; }
    </style>
</head>
<body>
    <header>📝 Notes</header>

    <div id="new-note">
        <input id="note-title" type="text" placeholder="Title…" />
        <textarea id="note-content" placeholder="Content…"></textarea>
        <button id="save-btn">Save Note</button>
    </div>

    <div id="notes-list">
        <p id="loading">Loading notes…</p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
