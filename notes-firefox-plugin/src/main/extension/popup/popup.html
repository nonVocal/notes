<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 420px; min-height: 480px; max-height: 580px;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: system-ui, sans-serif; color: #222;
        }

        .app-header {
            display: flex; align-items: center; justify-content: space-between;
            background: #1a1a2e; color: #fff; padding: 9px 14px; flex-shrink: 0;
        }
        .app-title { font-size: 14px; font-weight: 700; }
        .header-btn {
            background: rgba(255,255,255,.15); border: none; color: #fff;
            border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer;
        }
        .header-btn:hover { background: rgba(255,255,255,.28); }

        .app-body { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 118px; flex-shrink: 0; background: #1a1a2e; color: #fff;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .sidebar nav { flex: 1; padding: 8px 0; }
        .sidebar nav button {
            display: flex; align-items: center; gap: 6px; width: 100%;
            padding: 9px 10px; background: none; border: none;
            border-left: 3px solid transparent;
            color: rgba(255,255,255,.7); font-size: 12px; text-align: left; cursor: pointer;
        }
        .sidebar nav button:hover { background: rgba(255,255,255,.07); color: #fff; }
        .sidebar nav button.active {
            background: rgba(255,255,255,.11); color: #fff;
            border-left-color: #4f8ef7; font-weight: 600;
        }
        .sidebar-footer { padding: 7px 10px; font-size: 10px; color: rgba(255,255,255,.3); border-top: 1px solid rgba(255,255,255,.08); }

        .content { flex: 1; overflow-y: auto; padding: 12px; background: #f8f9fa; }
        .view { display: none; }
        .view.active { display: block; }
        .view-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid #e0e0e0; }

        .note-card { background: #fff; border-radius: 6px; padding: 9px 11px; border: 1px solid #e8eaed; margin-bottom: 8px; }
        .note-card-title   { font-weight: 600; font-size: 12px; margin-bottom: 3px; }
        .note-card-content { color: #666; font-size: 11px; white-space: pre-wrap; line-height: 1.4; max-height: 36px; overflow: hidden; }
        .note-card-footer  { display: flex; justify-content: flex-end; margin-top: 6px; }

        .field-label { display: block; font-size: 11px; font-weight: 600; color: #555; margin-bottom: 3px; }
        input[type=text], textarea {
            width: 100%; border: 1px solid #d0d5dd; border-radius: 4px;
            padding: 6px 8px; font-size: 12px; margin-bottom: 9px; font-family: inherit;
        }
        input[type=text]:focus, textarea:focus { outline: none; border-color: #4f8ef7; }
        textarea { height: 70px; resize: vertical; }
        #search-input { margin-bottom: 10px; }

        .btn { background: #1a73e8; color: #fff; border: none; border-radius: 4px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-weight: 500; }
        .btn:hover { background: #1558b0; }
        .btn-danger { background: #d93025; padding: 3px 8px; font-size: 11px; }
        .btn-danger:hover { background: #b1261c; }

        #status { font-size: 11px; min-height: 16px; margin-bottom: 7px; }
        #status.error   { color: #d93025; }
        #status.success { color: #1e8e3e; }
        .empty-hint { color: #888; font-size: 12px; }
        .err { color: #d93025; font-size: 12px; }
    </style>
</head>
<body>

<header class="app-header">
    <span class="app-title">📝 Notes</span>
    <button class="header-btn" id="open-sidebar-btn" title="Open as sidebar panel">⎙ Sidebar</button>
</header>

<div class="app-body">
    <aside class="sidebar">
        <nav id="sidebar-nav">
            <button data-view="all-notes" class="active">🗒 All Notes</button>
            <button data-view="new-note">✏️ New Note</button>
            <button data-view="search">🔍 Search</button>
        </nav>
        <div class="sidebar-footer">Ctrl+F</div>
    </aside>

    <main class="content">
        <section id="view-all-notes" class="view active">
            <div class="view-title">All Notes</div>
            <div id="notes-list"><p class="empty-hint">Loading…</p></div>
        </section>

        <section id="view-new-note" class="view">
            <div class="view-title">New Note</div>
            <p id="status"></p>
            <label class="field-label" for="title">Title</label>
            <input id="title" type="text" placeholder="Note title…" />
            <label class="field-label" for="note-content">Content</label>
            <textarea id="note-content" placeholder="Write your note…"></textarea>
            <button class="btn" id="save-btn">Save</button>
        </section>

        <section id="view-search" class="view">
            <div class="view-title">Search</div>
            <input id="search-input" type="text" placeholder="Search notes…" autocomplete="off" />
            <div id="search-results"></div>
        </section>
    </main>
</div>

<script src="popup.js"></script>
</body>
</html>
