<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: system-ui, sans-serif; color: #222;
        }

        .app-body { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 170px; flex-shrink: 0; background: #1a1a2e; color: #fff;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .sidebar-brand { padding: 16px 16px 13px; font-size: 15px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,.1); user-select: none; }
        .sidebar nav { flex: 1; padding: 10px 0; }
        .sidebar nav button {
            display: flex; align-items: center; gap: 8px; width: 100%;
            padding: 11px 14px; background: none; border: none;
            border-left: 3px solid transparent;
            color: rgba(255,255,255,.7); font-size: 13px; text-align: left; cursor: pointer;
            transition: background .12s, color .12s;
        }
        .sidebar nav button:hover { background: rgba(255,255,255,.07); color: #fff; }
        .sidebar nav button.active { background: rgba(255,255,255,.11); color: #fff; border-left-color: #4f8ef7; font-weight: 600; }
        .sidebar-footer { padding: 10px 14px; font-size: 11px; color: rgba(255,255,255,.3); border-top: 1px solid rgba(255,255,255,.08); }

        .content { flex: 1; overflow-y: auto; padding: 18px 20px; background: #f8f9fa; }
        .view { display: none; }
        .view.active { display: block; }
        .view-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #dde1e8; }

        .note-card { background: #fff; border-radius: 7px; padding: 11px 14px; border: 1px solid #e8eaed; margin-bottom: 10px; }
        .note-card-title   { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .note-card-content { color: #555; font-size: 12px; white-space: pre-wrap; line-height: 1.45; max-height: 48px; overflow: hidden; }
        .note-card-footer  { display: flex; justify-content: flex-end; margin-top: 8px; }

        .field-label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 4px; }
        input[type=text], textarea {
            width: 100%; border: 1px solid #d0d5dd; border-radius: 5px;
            padding: 7px 9px; font-size: 13px; margin-bottom: 11px; font-family: inherit;
        }
        input[type=text]:focus, textarea:focus { outline: none; border-color: #4f8ef7; box-shadow: 0 0 0 2px rgba(79,142,247,.15); }
        textarea { height: 100px; resize: vertical; }
        #search-input { margin-bottom: 12px; }
        .search-hint { font-size: 11px; color: #999; margin-bottom: 14px; }

        .btn { background: #1a73e8; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; font-size: 13px; cursor: pointer; font-weight: 500; }
        .btn:hover { background: #1558b0; }
        .btn-danger { background: #d93025; padding: 4px 10px; font-size: 12px; }
        .btn-danger:hover { background: #b1261c; }

        #status { font-size: 12px; min-height: 18px; margin-bottom: 10px; }
        #status.error   { color: #d93025; }
        #status.success { color: #1e8e3e; }
        .empty-hint { color: #888; font-size: 13px; }
        .err { color: #d93025; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-body">
    <aside class="sidebar">
        <div class="sidebar-brand">📝 Notes</div>
        <nav id="sidebar-nav">
            <button data-view="all-notes" class="active">🗒  All Notes</button>
            <button data-view="new-note">✏️  New Note</button>
            <button data-view="search">🔍  Search</button>
        </nav>
        <div class="sidebar-footer">Ctrl+F — Search</div>
    </aside>

    <main class="content">
        <section id="view-all-notes" class="view active">
            <div class="view-title">All Notes</div>
            <div id="notes-list"><p class="empty-hint">Loading…</p></div>
        </section>

        <section id="view-new-note" class="view">
            <div class="view-title">New Note</div>
            <p id="status"></p>
            <label class="field-label" for="title">Title</label>
            <input id="title" type="text" placeholder="Note title…" />
            <label class="field-label" for="note-content">Content</label>
            <textarea id="note-content" placeholder="Write your note here…"></textarea>
            <button class="btn" id="save-btn">Save Note</button>
        </section>

        <section id="view-search" class="view">
            <div class="view-title">Search</div>
            <input id="search-input" type="text" placeholder="Search notes…" autocomplete="off" />
            <p class="search-hint">Tip: press Ctrl+F from anywhere to jump here.</p>
            <div id="search-results"></div>
        </section>
    </main>
</div>

<script src="../popup/popup.js"></script>
</body>
</html>
